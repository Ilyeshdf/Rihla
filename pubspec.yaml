name: rehla
description: "Rihla - Algeria's AI-powered vacation planning app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0-57.0.dev

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.1
  google_fonts: ^6.1.0
  url_launcher: ^6.2.4
  shared_preferences: ^2.2.2
  lottie: ^3.1.0
  intl: ^0.20.2
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image_gallery_saver: ^2.0.3
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.3
  sensors_plus: ^4.0.2
  path_provider: ^2.1.2
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
